name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: erp_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysql,redis,mbstring,ctype,fileinfo,json
          ini-values: opcache.validate_timestamps=1,display_errors=On

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --no-dev

      - name: Install Node dependencies
        run: npm ci

      - name: Copy environment file
        run: cp .env.testing .env || cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate --env=testing

      - name: Build assets
        run: npm run build

      - name: Run Feature & Unit Tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: erp_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: |
          php artisan migrate:fresh --env=testing --force
          php artisan test

  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysql,redis,mbstring,ctype,fileinfo,json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --no-dev

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Install rsync and sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: Prepare remote directories
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_PASSWORD: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          HOSTINGER_REMOTE_BASE_DIR: ${{ secrets.HOSTINGER_REMOTE_BASE_DIR }}
        run: |
          sshpass -p "$HOSTINGER_SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "$HOSTINGER_SSH_PORT" "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST" "
            mkdir -p $HOSTINGER_REMOTE_BASE_DIR/public_html &&
            mkdir -p $HOSTINGER_REMOTE_BASE_DIR/public_html/erp &&
            mkdir -p $HOSTINGER_REMOTE_BASE_DIR/laravel_app/storage/logs &&
            mkdir -p $HOSTINGER_REMOTE_BASE_DIR/laravel_app/storage/app/private/contracts &&
            mkdir -p $HOSTINGER_REMOTE_BASE_DIR/laravel_app/bootstrap/cache
          "

      - name: Deploy Laravel app
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_PASSWORD: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          HOSTINGER_REMOTE_BASE_DIR: ${{ secrets.HOSTINGER_REMOTE_BASE_DIR }}
        run: |
          sshpass -p "$HOSTINGER_SSH_PASSWORD" rsync -avz \
            --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/app/*' \
            --exclude='tests' \
            --exclude='public_html' \
            --exclude='.env' \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $HOSTINGER_SSH_PORT" \
            ./ "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST:$HOSTINGER_REMOTE_BASE_DIR/laravel_app/"

      - name: Deploy landing page + ERP entry point
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_PASSWORD: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          HOSTINGER_REMOTE_BASE_DIR: ${{ secrets.HOSTINGER_REMOTE_BASE_DIR }}
        run: |
          sshpass -p "$HOSTINGER_SSH_PASSWORD" rsync -avz \
            --exclude='.git' \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $HOSTINGER_SSH_PORT" \
            ./public_html/ "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST:$HOSTINGER_REMOTE_BASE_DIR/public_html/"

      - name: Copy Vite assets to ERP public path
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_PASSWORD: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          HOSTINGER_REMOTE_BASE_DIR: ${{ secrets.HOSTINGER_REMOTE_BASE_DIR }}
        run: |
          sshpass -p "$HOSTINGER_SSH_PASSWORD" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $HOSTINGER_SSH_PORT" \
            ./public/build/ "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST:$HOSTINGER_REMOTE_BASE_DIR/public_html/erp/build/"

      - name: Verify assets on remote host
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_PASSWORD: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          HOSTINGER_REMOTE_BASE_DIR: ${{ secrets.HOSTINGER_REMOTE_BASE_DIR }}
        run: |
          sshpass -p "$HOSTINGER_SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "$HOSTINGER_SSH_PORT" "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST" "
            set -e
            test -f $HOSTINGER_REMOTE_BASE_DIR/public_html/erp/build/manifest.json
            ls -1 $HOSTINGER_REMOTE_BASE_DIR/public_html/erp/build/assets/*.css >/dev/null
            ls -1 $HOSTINGER_REMOTE_BASE_DIR/public_html/erp/build/assets/*.js >/dev/null
            echo 'Remote asset verification passed'
          "

      - name: Run post-deployment commands
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_PASSWORD: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          HOSTINGER_REMOTE_BASE_DIR: ${{ secrets.HOSTINGER_REMOTE_BASE_DIR }}
        run: |
          sshpass -p "$HOSTINGER_SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "$HOSTINGER_SSH_PORT" "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST" "
            set -e
            cd $HOSTINGER_REMOTE_BASE_DIR/laravel_app &&
            php artisan migrate --force --no-interaction &&
            php artisan db:seed --class=PipelineSeeder --force --no-interaction &&
            php artisan db:seed --class=FollowupSLASeeder --force --no-interaction &&
            php artisan db:seed --class=FollowupRuleSeeder --force --no-interaction &&
            php artisan package:discover --ansi &&
            php artisan optimize:clear &&
            php artisan storage:link --force || true &&
            echo 'Post-deployment completed (migrations + pipeline seeders applied)'
          "

      - name: Smoke test endpoint
        run: |
          set -e
          sleep 3
          ERP_LOGIN_URL="https://octabit.tech/erp/login"
          ERP_MANIFEST_URL="https://octabit.tech/erp/build/manifest.json"
          ERP_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://octabit.tech/erp/login" -k || echo "000")
          ERP_ASSET_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$ERP_MANIFEST_URL" -k || echo "000")
          LANDING_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://octabit.tech/" -k || echo "000")
          LOGIN_HTML=$(curl -sL "$ERP_LOGIN_URL" -k || true)
          CSS_ASSET_PATH=$(echo "$LOGIN_HTML" | grep -Eo '/erp/build/assets/[^"[:space:]]+\.css' | head -n 1 || true)
          echo "ERP HTTP Response: $ERP_HTTP_CODE"
          echo "ERP Asset HTTP Response: $ERP_ASSET_HTTP_CODE"
          echo "Landing HTTP Response: $LANDING_HTTP_CODE"
          if [ "$LANDING_HTTP_CODE" != "200" ] && [ "$LANDING_HTTP_CODE" != "301" ] && [ "$LANDING_HTTP_CODE" != "302" ]; then
            echo "❌ Landing page failed: HTTP $LANDING_HTTP_CODE"
            exit 1
          fi
          if [ "$ERP_HTTP_CODE" != "200" ] && [ "$ERP_HTTP_CODE" != "302" ]; then
            echo "❌ ERP login failed: HTTP $ERP_HTTP_CODE"
            exit 1
          fi
          if [ "$ERP_ASSET_HTTP_CODE" != "200" ]; then
            echo "❌ ERP manifest failed: HTTP $ERP_ASSET_HTTP_CODE"
            exit 1
          fi
          if [ -z "$CSS_ASSET_PATH" ]; then
            echo "❌ CSS asset path not found in ERP login HTML"
            exit 1
          fi
          CSS_ASSET_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://octabit.tech$CSS_ASSET_PATH" -k || echo "000")
          echo "ERP CSS Asset URL: https://octabit.tech$CSS_ASSET_PATH"
          echo "ERP CSS Asset HTTP Response: $CSS_ASSET_HTTP_CODE"
          if [ "$CSS_ASSET_HTTP_CODE" != "200" ]; then
            echo "❌ ERP CSS asset failed: HTTP $CSS_ASSET_HTTP_CODE"
            exit 1
          fi
          echo "✅ Smoke checks passed (landing, ERP login, manifest, CSS asset)"

      - name: Deployment Summary
        if: success()
        run: echo "✅ Deployment completed successfully!"
